name: Retrain and Push to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install MLflow
        run: pip install mlflow==2.19.0

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . -P n_estimators=100 --no-conda

      - name: Build and Push Docker Image (mlflow build-docker)
        run: |
          # Untuk mensimulasikan mlflow build-docker dari model terakhir yang dibuat
          # Gantilah `runs:/<RUN_ID>/model` dengan ID Run Anda yang sebenarnya atau kelola lewat script
